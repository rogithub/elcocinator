server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # .jsx no está en mime.types de nginx; sin esto se serviría como
    # application/octet-stream
    location ~ \.jsx$ {
        default_type application/javascript;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
